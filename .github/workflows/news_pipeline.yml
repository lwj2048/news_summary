name: News Summary

on:
  workflow_dispatch:
    inputs:
      douyin_url:
        description: '抖音视频链接'
        required: true
        type: string
        default: 'https://www.douyin.com/video/example'
      auto_commit:
        description: '自动提交到Git'
        required: false
        type: boolean
        default: true
      auto_push:
        description: '自动推送到远程'
        required: false
        type: boolean
        default: true

# 设置工作流程权限
permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}

jobs:
  news_processing:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install
        run: |
          sudo apt update
          sudo apt install -y ffmpeg git

      - name: requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install git+https://github.com/openai/whisper.git

      - name: install playwright browser
        run: python -m playwright install chromium

      - name: dir
        run: |
          mkdir -p downloads segments news

      - name: 配置Git用户信息
        run: |
          # 使用GitHub Actions默认用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 生成统一时间戳
        run: |
          timestamp=$(python scripts/resolve_douyin_video_timestamp.py --video-url "${{ github.event.inputs.douyin_url }}" || date +"%Y%m%d-%H%M")
          echo "TIMESTAMP=$timestamp" >> $GITHUB_ENV
          echo "本次流水线时间戳: $timestamp"

      - name: 步骤1:下载抖音视频
        if: github.event.inputs.douyin_url != ''
        run: |
          echo "开始下载抖音视频: ${{ github.event.inputs.douyin_url }}"
          python scripts/douyin_download.py --url "${{ github.event.inputs.douyin_url }}"

      - name: 步骤2:MP4转MP3
        if: github.event.inputs.douyin_url != ''
        run: |
          echo "开始转换MP4为MP3..."
          cd downloads
          # 检查是否有MP4文件
          if ls *.mp4 1> /dev/null 2>&1; then
            video=$(ls *.mp4 | head -1)
            echo "找到MP4文件: $video"
            mp3_name="${video%.mp4}.mp3"
            echo "开始转换: $video -> $mp3_name"
            ffmpeg -i "$video" -vn -acodec libmp3lame -ar 16000 -ac 1 -q:a 2 -y "$mp3_name"
            if [ $? -eq 0 ]; then
              echo "✅ 转换成功: $mp3_name"
              rm "$video"
              echo "🧹 已删除原MP4文件: $video"
            else
              echo "❌ 转换失败: $video"
            fi
          else
            echo "❌ 未找到MP4文件"
            echo "当前目录内容:"
            ls -la
            echo "检查downloads目录内容:"
            ls -la ..
          fi
          cd ..

      - name: 步骤3:MP3转文字
        if: github.event.inputs.douyin_url != ''
        run: |
          echo "开始转换MP3到文字..."
          echo "使用时间戳: ${{ env.TIMESTAMP }}"
          python scripts/mp3_2_txt.py --timestamp ${{ env.TIMESTAMP }}

      - name: 步骤4:AI总结
        if: github.event.inputs.douyin_url != ''
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          echo "开始生成AI总结..."
          echo "使用时间戳: ${{ env.TIMESTAMP }}"
          python scripts/qwen_news_summary.py --timestamp ${{ env.TIMESTAMP }}

      - name: 步骤5:Git提交
        if: github.event.inputs.auto_commit != false
        run: |
          echo "开始Git提交..."
          python scripts/git_commit.py

      - name: 推送到远程
        if: github.event.inputs.auto_push != false
        run: |
          echo "推送到远程仓库..."
          git push origin HEAD:${{ github.ref }}

      - name: 完成报告
        run: |
          echo "🎉 新闻处理流水线完成！"
          echo "时间: $(date)"
          if [ -d "news" ]; then
            echo "生成的文件:"
            ls -la news/

          fi 

