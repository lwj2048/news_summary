name: Douyin Daily Author Pipeline

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:
    inputs:
      author_url:
        description: 抖音博主主页链接
        required: false
        type: string
        default: "https://www.douyin.com/user/MS4wLjABAAAAWGs2N4r_PbCH8uXi07DlK8G5T-dz2EA_bnoWb00V5BaR_-LdVLMDxIfqFbU8qbwX"
      author_id:
        description: 抖音博主 author_id
        required: false
        type: string
        default: "MS4wLjABAAAAWGs2N4r_PbCH8uXi07DlK8G5T-dz2EA_bnoWb00V5BaR_-LdVLMDxIfqFbU8qbwX"
      all_history:
        description: 是否处理全部历史未处理视频
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}

jobs:
  daily_author_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install ffmpeg and git
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git

      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: install playwright browser
        run: python -m playwright install chromium

      - name: create workspace directories
        run: |
          mkdir -p downloads segments news data

      - name: configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: run daily author pipeline
        run: |
          cmd=(python scripts/run_daily_author_pipeline.py)
          if [ -n "${{ inputs.author_url }}" ]; then
            cmd+=(--author-url "${{ inputs.author_url }}")
          fi
          if [ -n "${{ inputs.author_id }}" ]; then
            cmd+=(--author-id "${{ inputs.author_id }}")
          fi
          if [ "${{ inputs.all_history }}" = "true" ]; then
            cmd+=(--all-history)
          fi
          "${cmd[@]}"

      - name: commit and push changes
        run: |
          changed_files="$(git status --porcelain -- news/ data/processed_douyin_videos.json)"
          if [ -n "$changed_files" ]; then
            git add news/ data/processed_douyin_videos.json
            git commit -m "chore: update daily douyin author pipeline output"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "无变更，跳过 push"
          fi
